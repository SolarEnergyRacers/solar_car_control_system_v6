
; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = Drive controller (DC) v6 for SER solar car
lib_dir = ./lib

[env]
platform = espressif32@7.0.1
board = esp32dev
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
framework = espidf, arduino
platform_packages = framework-arduinoespressif32
lib_ldf_mode = deep+
build_flags = 
	-D DCMODE=1
	-D ESP32=1
	-D ARDUINO_ARCH_ESP32=1
	-Wno-narrowing
	-fexceptions
build_unflags = 
	-fno-exceptions
lib_deps = 
	br3ttb/PID@1.2.1
	fbiego/ESP32Time @ ^2.0.0
	fmtlib/fmt@8.1.1
	khoih-prog/ESP32_PWM@^1.3.3
	makuna/RTC @ ^2.3.7
	mikalhart/Streaming@1.0.0
	paulstoffregen/OneWire@2.3.8
	plerup/EspSoftwareSerial@8.2.0
	robtillaart/ADS1X15@0.6.2
; SER sources
lib_extra_dirs = 
	../lib_common
extra_scripts = upload_no_build.py

[env:esp32dev-linux]
;upload_port = /dev/ttyUSB1
;monitor_port = /dev/ttyUSB1
upload_port = /dev/esp32-dc
monitor_port = /dev/esp32-dc
monitor_speed = 115200
monitor_echo = yes
monitor_eol = LF
monitor_filters = 
	direct
	send_on_enter
	time
	esp32_exception_decoder

[env:esp32dev-windows]
upload_port = COM4
monitor_port = COM4
monitor_speed = 115200
monitor_echo = yes
monitor_eol = LF
monitor_filters = 
	send_on_enter
	default
	time
	esp32_exception_decoder
lib_deps = khoih-prog/ESP32_PWM@^1.3.3
